<title>לִשׁוֹן — Hebrew through Song</title>

<style>
:root {
  --bg: #0d0d1a;
  --surface: #1a1a2e;
  --card: #1e2540;
  --border: rgba(255,255,255,0.08);
  --gold: #f0a500;
  --gold-glow: rgba(240,165,0,0.25);
  --gold-dim: #c88800;
  --white: #f0f0f0;
  --muted: #6b7a99;
  --translation: #8892a4;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; }
.screen { position: fixed; inset: 0; overflow-y: auto; background: var(--bg); transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s; will-change: transform; }
.screen.hidden { transform: translateY(100%); opacity: 0; pointer-events: none; }
.screen.slide-up { transform: translateY(0); opacity: 1; }

/* ── HOME ── */
#home { padding-top: var(--safe-top); }
.home-header { padding: 20px 20px 12px; display: flex; justify-content: space-between; align-items: flex-end; }
.app-name { font-family: 'Frank Ruhl Libre', serif; font-size: 42px; font-weight: 900; color: var(--gold); letter-spacing: 2px; line-height: 1; }
.app-sub { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: 'Inter', sans-serif; direction: ltr; text-align: left; }
.words-badge { background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 6px 14px; font-size: 13px; color: var(--gold); font-weight: 600; white-space: nowrap; flex-shrink: 0; transition: transform 0.2s; }
.words-badge.pop { transform: scale(1.2); }
.search-wrap { padding: 0 20px 12px; }
.search-box { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; color: var(--white); font-size: 15px; outline: none; direction: rtl; font-family: 'Inter', sans-serif; }
.search-box::placeholder { color: var(--muted); }
.search-box:focus { border-color: rgba(240,165,0,0.4); }
.genres { display: flex; gap: 8px; padding: 0 20px 16px; overflow-x: auto; scrollbar-width: none; }
.genres::-webkit-scrollbar { display: none; }
.genre-chip { background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 7px 16px; font-size: 13px; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.2s; font-family: 'Inter', sans-serif; direction: ltr; }
.genre-chip.active { background: rgba(240,165,0,0.15); border-color: var(--gold); color: var(--gold); }
.song-list { padding: 0 20px; padding-bottom: calc(20px + var(--safe-bottom)); display: flex; flex-direction: column; gap: 10px; }
.song-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; direction: rtl; }
.song-card:active { transform: scale(0.97); box-shadow: 0 0 0 2px var(--gold-glow); }
.cover-swatch { width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
.cover-letter { font-family: 'Frank Ruhl Libre', serif; font-size: 30px; font-weight: 900; color: rgba(255,255,255,0.85); }
.song-info { flex: 1; min-width: 0; }
.song-title-he { font-family: 'Frank Ruhl Libre', serif; font-size: 18px; font-weight: 700; color: var(--white); }
.song-title-tr { font-size: 13px; color: var(--muted); margin-top: 2px; direction: ltr; text-align: right; }
.song-artist { font-size: 12px; color: var(--muted); margin-top: 4px; }
.song-meta { display: flex; gap: 6px; align-items: center; margin-top: 6px; flex-wrap: wrap; direction: ltr; justify-content: flex-end; }
.genre-tag { background: rgba(255,255,255,0.06); border-radius: 999px; padding: 2px 10px; font-size: 11px; color: var(--muted); }
.meta-dot { color: var(--border); font-size: 10px; }
.chevron { color: var(--muted); font-size: 22px; flex-shrink: 0; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-emoji { font-size: 48px; margin-bottom: 12px; }

/* ── LYRICS ── */
#lyrics { padding-top: var(--safe-top); display: flex; flex-direction: column; }
.lyrics-header { display: flex; align-items: center; padding: 12px 16px; gap: 12px; flex-shrink: 0; border-bottom: 1px solid var(--border); direction: ltr; }
.back-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 999px; background: var(--card); border: 1px solid var(--border); cursor: pointer; font-size: 22px; color: var(--gold); transition: transform 0.15s; flex-shrink: 0; }
.back-btn:active { transform: scale(0.9); }
.lyrics-header-info { flex: 1; overflow: hidden; }
.lyrics-header-title { font-size: 15px; font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'Frank Ruhl Libre', serif; direction: rtl; }
.lyrics-header-artist { font-size: 12px; color: var(--muted); direction: ltr; }
.hero { padding: 20px; flex-shrink: 0; }
.hero-title { font-family: 'Frank Ruhl Libre', serif; font-size: 36px; font-weight: 900; color: rgba(255,255,255,0.95); margin-bottom: 4px; direction: rtl; }
.hero-translit { font-size: 17px; color: rgba(255,255,255,0.75); margin-bottom: 2px; direction: ltr; }
.hero-en { font-size: 14px; color: rgba(255,255,255,0.5); font-style: italic; margin-bottom: 12px; direction: ltr; }
.hero-meta { display: flex; gap: 8px; align-items: center; direction: ltr; flex-wrap: wrap; }
.hero-pill { background: rgba(0,0,0,0.3); border-radius: 999px; padding: 4px 12px; font-size: 12px; color: rgba(255,255,255,0.7); }
.toolbar { display: flex; align-items: center; gap: 0; padding: 0 16px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; flex-shrink: 0; direction: ltr; }
.toggle-btn { flex: 1; padding: 12px 8px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--muted); cursor: pointer; font-family: 'Inter', sans-serif; }
.toggle-btn.active { color: var(--gold); }
.toggle-dot { width: 28px; height: 16px; border-radius: 999px; background: var(--card); border: 1px solid var(--border); position: relative; transition: background 0.2s; }
.toggle-dot.on { background: rgba(240,165,0,0.3); border-color: var(--gold); }
.toggle-dot::after { content: ''; position: absolute; top: 2px; left: 2px; width: 10px; height: 10px; border-radius: 50%; background: var(--muted); transition: transform 0.2s, background 0.2s; }
.toggle-dot.on::after { transform: translateX(12px); background: var(--gold); }
.toolbar-divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
.size-btn { padding: 10px 16px; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; border: 1px solid var(--border); border-radius: 8px; background: var(--card); margin: 8px; transition: all 0.15s; }
.size-btn.active { color: var(--gold); border-color: var(--gold); background: rgba(240,165,0,0.1); }
.lyrics-scroll { flex: 1; overflow-y: auto; padding: 16px 12px; padding-bottom: calc(32px + var(--safe-bottom)); }
.lyric-line { display: flex; flex-direction: row-reverse; flex-wrap: wrap; justify-content: flex-end; align-items: flex-start; margin-bottom: 8px; gap: 4px; }
.word-card { display: flex; flex-direction: column; align-items: center; padding: 8px 10px; border-radius: 10px; border: 1.5px solid transparent; cursor: pointer; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s; min-width: 44px; background: transparent; }
.word-card:active { transform: scale(0.95); }
.word-card.highlighted { border-color: var(--gold); background: rgba(240,165,0,0.1); box-shadow: 0 0 12px var(--gold-glow); }
.w-hebrew { font-family: 'Frank Ruhl Libre', serif; font-size: 28px; font-weight: 700; color: var(--gold); text-align: center; line-height: 1.2; }
.w-translit { font-size: 13px; color: var(--white); text-align: center; margin-top: 3px; opacity: 0.85; direction: ltr; transition: all 0.25s; overflow: hidden; max-height: 30px; }
.w-translit.hidden { max-height: 0; opacity: 0; margin-top: 0; }
.w-translation { font-size: 11px; color: var(--translation); text-align: center; margin-top: 2px; font-style: italic; direction: ltr; transition: all 0.25s; overflow: hidden; max-height: 30px; }
.w-translation.hidden { max-height: 0; opacity: 0; margin-top: 0; }
.w-hebrew.large { font-size: 36px; }
.w-translit.large { font-size: 15px; }
.w-translation.large { font-size: 13px; }
.lyrics-footer { text-align: center; padding: 24px; color: var(--muted); font-size: 13px; }
.progress-bar { display: flex; justify-content: center; gap: 5px; padding: 12px; }
.progress-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
.progress-dot.active { background: var(--gold); }

/* milestone toast */
.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: var(--surface); border: 1px solid var(--gold); border-radius: 20px; padding: 16px 28px; font-size: 22px; text-align: center; z-index: 999; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s; opacity: 0; pointer-events: none; }
.toast.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
</style>
</head>

// State
let currentSong = null;
let showTranslit = true;
let showTrans = true;
let largeFont = false;
let activeGenre = 'All';
let searchQuery = '';
let learnedWords = new Set(JSON.parse(localStorage.getItem('lishon_words') || '[]'));
let highlighted = new Set();

const GENRES = ['All', 'Rock', 'Pop', 'Folk', 'Indie'];
const MILESTONES = [10, 25, 50, 100];

// Init
updateWordsBadge();
renderGenres();
renderSongs();

function updateWordsBadge() {
  const el = document.getElementById('words-badge');
  el.textContent = `✨ ${learnedWords.size} words`;
}

function saveWords() {
  localStorage.setItem('lishon_words', JSON.stringify([...learnedWords]));
}

function renderGenres() {
  const el = document.getElementById('genres');
  el.innerHTML = GENRES.map(g =>
    `<div class="genre-chip ${g === activeGenre ? 'active' : ''}" onclick="setGenre('${g}')">${g}</div>`
  ).join('');
}

function setGenre(g) {
  activeGenre = g;
  renderGenres();
  renderSongs();
}

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderSongs();
});

function renderSongs() {
  const q = searchQuery.toLowerCase();
  const filtered = SONGS.filter(s => {
    const matchSearch = !q ||
      s.title.includes(searchQuery) ||
      s.titleTranslit.toLowerCase().includes(q) ||
      s.artistEn.toLowerCase().includes(q) ||
      s.artist.includes(searchQuery);
    const matchGenre = activeGenre === 'All' ||
      s.genreEn.toLowerCase().includes(activeGenre.toLowerCase());
    return matchSearch && matchGenre;
  });

  const el = document.getElementById('song-list');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-emoji">🎵</div><div>לא נמצאו שירים</div></div>';
    return;
  }
  const wordCount = s => s.lines.reduce((a, l) => a + l.length, 0);
  el.innerHTML = filtered.map((s, i) => `
    <div class="song-card" onclick="openSong('${s.id}')">
      <div class="cover-swatch" style="background:${s.coverColor}">
        <span class="cover-letter">${s.title[0]}</span>
      </div>
      <div class="song-info">
        <div class="song-title-he">${s.title}</div>
        <div class="song-title-tr">${s.titleTranslit}</div>
        <div class="song-artist">${s.artist}</div>
        <div class="song-meta">
          <span class="genre-tag">${s.genreEn}</span>
          <span class="meta-dot">·</span>
          <span class="genre-tag">${s.year}</span>
          <span class="meta-dot">·</span>
          <span class="genre-tag">${wordCount(s)} מילים</span>
        </div>
      </div>
      <div class="chevron">›</div>
    </div>
  `).join('');
}

function openSong(id) {
  currentSong = SONGS.find(s => s.id === id);
  highlighted = new Set();
  showTranslit = true;
  showTrans = true;
  largeFont = false;

  document.getElementById('dot-translit').className = 'toggle-dot on';
  document.getElementById('dot-trans').className = 'toggle-dot on';
  document.getElementById('toggle-translit').className = 'toggle-btn active';
  document.getElementById('toggle-trans').className = 'toggle-btn active';
  document.getElementById('size-btn').className = 'size-btn';

  document.getElementById('lyrics-header-title').textContent = currentSong.title;
  document.getElementById('lyrics-header-artist').textContent = currentSong.artistEn + ' · ' + currentSong.year;

  document.getElementById('hero').style.background = currentSong.coverColor;
  document.getElementById('hero').innerHTML = `
    <div class="hero-title">${currentSong.title}</div>
    <div class="hero-translit" dir="ltr">${currentSong.titleTranslit}</div>
    <div class="hero-en" dir="ltr">${currentSong.titleEn}</div>
    <div class="hero-meta">
      <span class="hero-pill">${currentSong.artistEn}</span>
      <span class="hero-pill">${currentSong.year}</span>
      <span class="hero-pill">${currentSong.genreEn}</span>
    </div>
  `;

  renderLyrics();

  document.getElementById('home').classList.remove('slide-up');
  document.getElementById('home').classList.add('hidden');
  document.getElementById('lyrics').classList.remove('hidden');
  document.getElementById('lyrics').classList.add('slide-up');
  document.getElementById('lyrics').scrollTop = 0;

  localStorage.setItem('lishon_last', id);
}

function goHome() {
  document.getElementById('lyrics').classList.remove('slide-up');
  document.getElementById('lyrics').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  document.getElementById('home').classList.add('slide-up');
}

document.getElementById('back-btn').onclick = goHome;

function renderLyrics() {
  if (!currentSong) return;
  const el = document.getElementById('lyrics-content');
  const sizeCls = largeFont ? ' large' : '';

  const linesHtml = currentSong.lines.map((line, li) => {
    const wordsHtml = line.map((w, wi) => {
      const hlit = highlighted.has(li + '_' + wi) ? ' highlighted' : '';
      const tHide = showTranslit ? '' : ' hidden';
      const trHide = showTrans ? '' : ' hidden';
      return `<div class="word-card${hlit}" onclick="tapWord(${li},${wi})">
        <div class="w-hebrew${sizeCls}">${w.hebrew}</div>
        <div class="w-translit${sizeCls}${tHide}">${w.transliteration}</div>
        <div class="w-translation${sizeCls}${trHide}">${w.translation}</div>
      </div>`;
    }).join('');
    return `<div class="lyric-line">${wordsHtml}</div>`;
  }).join('');

  const totalSongs = SONGS.length;
  const songIdx = SONGS.findIndex(s => s.id === currentSong.id);
  const dotsHtml = Array.from({length: Math.min(totalSongs, 15)}, (_, i) =>
    `<div class="progress-dot${i === songIdx ? ' active' : ''}"></div>`
  ).join('');

  el.innerHTML = linesHtml +
    `<div class="lyrics-footer">🎵 ${currentSong.artist} — ${currentSong.titleEn}</div>
     <div class="progress-bar">${dotsHtml}</div>`;
}

function tapWord(li, wi) {
  const word = currentSong.lines[li][wi];
  const key = li + '_' + wi;
  const card = document.querySelectorAll('.lyric-line')[li]
    ?.querySelectorAll('.word-card')[wi];

  if (highlighted.has(key)) {
    highlighted.delete(key);
    card?.classList.remove('highlighted');
  } else {
    highlighted.add(key);
    card?.classList.add('highlighted');
    // Learn word
    const wasNew = !learnedWords.has(word.hebrew);
    learnedWords.add(word.hebrew);
    saveWords();
    updateWordsBadge();
    if (wasNew) checkMilestone();
  }
}

function checkMilestone() {
  const count = learnedWords.size;
  if (MILESTONES.includes(count)) {
    const msgs = {10:'🎉 10 מילים!', 25:'⭐ 25 מילים!', 50:'🔥 50 מילים!', 100:'🏆 100 מילים!'};
    showToast(msgs[count] || `✨ ${count}!`);
    const badge = document.getElementById('words-badge');
    badge.classList.add('pop');
    setTimeout(() => badge.classList.remove('pop'), 400);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function toggleTranslit() {
  showTranslit = !showTranslit;
  document.getElementById('dot-translit').className = 'toggle-dot' + (showTranslit ? ' on' : '');
  document.getElementById('toggle-translit').className = 'toggle-btn' + (showTranslit ? ' active' : '');
  document.querySelectorAll('.w-translit').forEach(el => {
    el.classList.toggle('hidden', !showTranslit);
  });
}

function toggleTrans() {
  showTrans = !showTrans;
  document.getElementById('dot-trans').className = 'toggle-dot' + (showTrans ? ' on' : '');
  document.getElementById('toggle-trans').className = 'toggle-btn' + (showTrans ? ' active' : '');
  document.querySelectorAll('.w-translation').forEach(el => {
    el.classList.toggle('hidden', !showTrans);
  });
}

function toggleSize() {
  largeFont = !largeFont;
  document.getElementById('size-btn').className = 'size-btn' + (largeFont ? ' active' : '');
  renderLyrics();
}

// Restore last song
const lastId = localStorage.getItem('lishon_last');
